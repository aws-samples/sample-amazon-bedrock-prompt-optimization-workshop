AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CodePipeline for automated prompt evaluation and deployment.
  This template creates a CI/CD pipeline that evaluates prompt changes
  against a Langfuse dataset before allowing deployment to production.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  LangfuseHost:
    Type: String
    Description: Self-hosted Langfuse URL (e.g., https://langfuse.internal.company.com)
    Default: https://cloud.langfuse.com

  RepositoryName:
    Type: String
    Description: CodeCommit repository name containing prompt definitions
    Default: prompt-repo

  BranchName:
    Type: String
    Description: Branch to monitor for changes
    Default: main

  EvalDatasetName:
    Type: String
    Description: Langfuse dataset name used for evaluation
    Default: customer-support-eval

  ScoreThreshold:
    Type: String
    Description: Minimum average score to pass quality gate (0.0 - 1.0)
    Default: '0.7'

  PassRateThreshold:
    Type: String
    Description: Minimum pass rate to pass quality gate (0.0 - 1.0)
    Default: '0.8'

  NotificationEmail:
    Type: String
    Description: Email address for pipeline failure notifications
    Default: ''

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasNotificationEmail: !Not [!Equals [!Ref NotificationEmail, '']]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # --- Secrets Manager for Langfuse credentials ---
  LangfuseCredentials:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: langfuse-pipeline-credentials
      Description: Langfuse API credentials for prompt evaluation pipeline
      SecretString: !Sub |
        {
          "public_key": "REPLACE_WITH_YOUR_PUBLIC_KEY",
          "secret_key": "REPLACE_WITH_YOUR_SECRET_KEY"
        }

  # --- S3 bucket for pipeline artifacts ---
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'prompt-pipeline-artifacts-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # --- SNS topic for notifications ---
  PipelineNotificationTopic:
    Type: AWS::SNS::Topic
    Condition: HasNotificationEmail
    Properties:
      TopicName: prompt-pipeline-notifications
      Subscription:
        - Endpoint: !Ref NotificationEmail
          Protocol: email

  # --- CodeBuild project for evaluation ---
  EvaluationProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: prompt-evaluation
      Description: Runs prompt evaluation against Langfuse dataset
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: LANGFUSE_BASE_URL
            Value: !Ref LangfuseHost
          - Name: EVAL_DATASET_NAME
            Value: !Ref EvalDatasetName
          - Name: EVAL_SCORE_THRESHOLD
            Value: !Ref ScoreThreshold
          - Name: EVAL_PASS_RATE_THRESHOLD
            Value: !Ref PassRateThreshold
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          env:
            secrets-manager:
              LANGFUSE_PUBLIC_KEY: "langfuse-pipeline-credentials:public_key"
              LANGFUSE_SECRET_KEY: "langfuse-pipeline-credentials:secret_key"
          phases:
            install:
              runtime-versions:
                python: 3.11
              commands:
                - pip install -q langfuse boto3
            pre_build:
              commands:
                - echo "Fetching evaluation dataset from Langfuse..."
                - echo "Dataset = $EVAL_DATASET_NAME"
                - echo "Score threshold = $EVAL_SCORE_THRESHOLD"
            build:
              commands:
                - echo "Running prompt evaluation..."
                - python scripts/evaluate_prompt.py
            post_build:
              commands:
                - echo "Evaluation complete"
                - python scripts/check_quality_gate.py
          reports:
            prompt-eval-report:
              files:
                - "evaluation_results.json"
              file-format: "GENERICJSONFORMAT"
          cache:
            paths:
              - "/root/.cache/pip/**/*"
      TimeoutInMinutes: 15

  # --- Lambda function for CodePipeline test action ---
  EvaluationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: prompt-evaluator
      Description: Runs prompt evaluation and reports result to CodePipeline
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          LANGFUSE_BASE_URL: !Ref LangfuseHost
          LANGFUSE_CREDENTIALS_SECRET: !Ref LangfuseCredentials
          EVAL_DATASET_NAME: !Ref EvalDatasetName
          EVAL_SCORE_THRESHOLD: !Ref ScoreThreshold
          EVAL_PASS_RATE_THRESHOLD: !Ref PassRateThreshold
      Code:
        ZipFile: |
          """
          Lambda function for CodePipeline test action.
          Retrieves Langfuse credentials from Secrets Manager,
          runs evaluation, and reports success/failure to CodePipeline.
          """
          import json
          import os
          import boto3

          codepipeline = boto3.client("codepipeline")
          secrets_manager = boto3.client("secretsmanager")

          def lambda_handler(event, context):
              job_id = event["CodePipeline.job"]["id"]
              try:
                  # Retrieve Langfuse credentials from Secrets Manager
                  secret_arn = os.environ["LANGFUSE_CREDENTIALS_SECRET"]
                  secret_value = secrets_manager.get_secret_value(SecretId=secret_arn)
                  creds = json.loads(secret_value["SecretString"])
                  os.environ["LANGFUSE_PUBLIC_KEY"] = creds["public_key"]
                  os.environ["LANGFUSE_SECRET_KEY"] = creds["secret_key"]

                  # Parse user parameters
                  user_params = event["CodePipeline.job"].get("data", {}).get(
                      "actionConfiguration", {}
                  ).get("configuration", {}).get("UserParameters", "{}")
                  params = json.loads(user_params) if user_params else {}

                  dataset = params.get("dataset", os.environ["EVAL_DATASET_NAME"])
                  threshold = float(params.get("threshold", os.environ["EVAL_SCORE_THRESHOLD"]))

                  # Placeholder: actual evaluation logic would go here
                  # In production, import and call the evaluate_prompt module
                  results = {"avg_score": 0.85, "pass_rate": 1.0}

                  if results["avg_score"] >= threshold:
                      codepipeline.put_job_success_result(
                          jobId=job_id,
                          outputVariables={
                              "avg_score": str(results["avg_score"]),
                              "pass_rate": str(results["pass_rate"]),
                          },
                      )
                      return {"status": "PASSED", "results": results}
                  else:
                      codepipeline.put_job_failure_result(
                          jobId=job_id,
                          failureDetails={
                              "type": "JobFailed",
                              "message": (
                                  f"Quality gate failed: avg_score={results['avg_score']:.2f}"
                              ),
                          },
                      )
                      return {"status": "FAILED", "results": results}
              except Exception as e:
                  codepipeline.put_job_failure_result(
                      jobId=job_id,
                      failureDetails={"type": "JobFailed", "message": str(e)},
                  )
                  raise

  # --- CodePipeline ---
  PromptPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: prompt-evaluation-pipeline
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        # Stage 1: Source
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: '1'
              Configuration:
                RepositoryName: !Ref RepositoryName
                BranchName: !Ref BranchName
                PollForSourceChanges: false
              OutputArtifacts:
                - Name: SourceOutput

        # Stage 2: Build and evaluate
        - Name: BuildAndEvaluate
          Actions:
            - Name: RunEvaluation
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref EvaluationProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: EvalOutput

        # Stage 3: Manual approval
        - Name: Approval
          Actions:
            - Name: ManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: '1'
              Configuration:
                CustomData: >
                  Review evaluation results in Langfuse before
                  deploying prompt to production.

        # Stage 4: Deploy prompt (via Lambda)
        - Name: Deploy
          Actions:
            - Name: DeployPrompt
              ActionTypeId:
                Category: Invoke
                Owner: AWS
                Provider: Lambda
                Version: '1'
              Configuration:
                FunctionName: !Ref EvaluationLambda
                UserParameters: !Sub |
                  {"dataset": "${EvalDatasetName}", "threshold": ${ScoreThreshold}}
              InputArtifacts:
                - Name: EvalOutput

  # --- IAM Roles ---

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: prompt-eval-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: CodeBuildBase
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub '${ArtifactBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - codebuild:CreateReportGroup
                  - codebuild:CreateReport
                  - codebuild:UpdateReport
                  - codebuild:BatchPutTestCases
                  - codebuild:BatchPutCodeCoverages
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:report-group/*'
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref LangfuseCredentials

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: prompt-eval-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: CodePipelineAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codepipeline:PutJobSuccessResult
                  - codepipeline:PutJobFailureResult
                Resource: '*'
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref LangfuseCredentials

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: prompt-eval-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub '${ArtifactBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - codecommit:GetBranch
                  - codecommit:GetCommit
                  - codecommit:UploadArchive
                  - codecommit:GetUploadArchiveStatus
                  - codecommit:CancelUploadArchive
                Resource: !Sub 'arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${RepositoryName}'
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt EvaluationProject.Arn
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt EvaluationLambda.Arn

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  PipelineName:
    Description: Name of the CodePipeline
    Value: !Ref PromptPipeline

  PipelineUrl:
    Description: URL to view the pipeline in the AWS Console
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${PromptPipeline}/view'

  EvaluationProjectName:
    Description: Name of the CodeBuild evaluation project
    Value: !Ref EvaluationProject

  ArtifactBucketName:
    Description: S3 bucket for pipeline artifacts
    Value: !Ref ArtifactBucket
